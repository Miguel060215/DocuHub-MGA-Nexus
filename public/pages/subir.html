<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuHub - Subir Documento</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="l-wrapper">
        <header class="l-header">
            <div class="logo-circle">
                <img src="../assets/Logotipo.png" alt="Logo DocuHub" class="logo-img">
            </div>

            <nav class="l-nav-desktop">
                <a href="../index.html">INICIO</a>
                <a href="buscar.html">BUSCAR</a>
                <a href="subir.html">SUBIR</a>
            </nav>
            <div class="l-nav-mobile">
                <span id="btn-menu">☰</span>
                <ul class="mobile-menu" id="menu-desplegable">
                    <li><a href="../index.html">INICIO</a></li>
                    <li><a href="buscar.html">BUSCAR</a></li>
                    <li><a href="subir.html">SUBIR</a></li>
                </ul>
            </div>
            <a class="user-info" href="login.html">LOGIN</a>
        </header>

        <main class="l-main">
            <h2 class="upload-title">SUBIR DOCUMENTO</h2>
            
            <form class="l-form-container">
                <p>Llena los campos</p>

                <div class="form-group">
                    <label for="titulo">Título del documento:</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ingrese el título de la investigación" required>
                </div>

                <div class="form-group">
                    <label for="carrera">Carrera:</label>
                    <select id="carrera" name="carrera" required>
                        <option value="">Seleccione una carrera</option>
                        <option value="sistemas">Ingeniería en Sistemas</option>
                        <option value="industrial">Ingeniería Industrial</option>
                        <option value="administracion">Administración</option>
                        <option value="contabilidad">Contabilidad</option>
                        <option value="derecho">Derecho</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="palabras">Palabras Clave:</label>
                    <input type="text" id="palabras" name="palabras" placeholder="IA, Tecnología, Programación">
                </div>

                <div class="form-group">
                    <label for="resumen">Resumen / Abstract:</label>
                    <textarea id="resumen" name="resumen" rows="5" placeholder="Escriba un resumen de la investigación" required></textarea>
                </div>

                <div class="form-group">
                    <label for="archivo">Archivo PDF:</label>
                    <input type="file" id="archivo" name="archivo" accept=".pdf" required>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: space-between; margin-top: 1.5rem;">
                    <button type="button" class="btn-secondary">Buscar documento PDF</button>
                    <button type="submit" class="btn-primary">Enviar</button>
                </div>
            </form>
        </main>

        <footer class="l-footer">
            <div class="footer-content">
                <p>&copy; 2026 MGA Nexus</p>
                <div class="footer-contact">
                    <p>Tel: (656) 123-4567</p>
                    <p>Correo: mganexusdochub@gmail.com</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
