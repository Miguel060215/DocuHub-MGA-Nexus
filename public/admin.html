<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuHub - Moderación</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="l-wrapper">
        <header class="l-header">
            <div class="logo-circle">
                <img src="../assets/Logotipo.png" alt="Logo DocuHub" class="logo-img">
            </div>
            <div class="user-info">Rol: Admin | Usuario | Cerrar sesión</div>
        </header>

        <main class="l-main">
            <h2>Panel de moderación</h2>

            <div class="l-dos-columnas">
                <section class="l-content-scroll table-container">
                    <h3>TABLA DE GESTION</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Documento</th>
                                <th>Autor</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Nombre doc</td>
                                <td>Nombre autor</td>
                                <td>Dia/mes/año</td>
                                <td>
                                    <button>Aprobar</button>
                                    <button>Rechazar</button>
                                    <button>Leer</button>
                                </td>
                            </tr>
                            </tbody>
                    </table>
                </section>

                <aside class="l-document-preview">
                    <h3>CONTENIDO DEL DOCUMENTO</h3>
                    <div class="pdf-viewer-placeholder">
                        Seleccione una solicitud para leer (Solo lectura)
                    </div>
                </aside>
            </div>
        </main>

        <footer class="l-footer">
            <p>PIE DE PÁGINA</p>
        </footer>
    </div>
</body>
</html>
