<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuHub - Detalle</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="l-wrapper">
         <header class="l-header">
            <div class="logo-circle">
                <img src="../assets/Logotipo.png" alt="Logo DocuHub" class="logo-img">
            </div>

            <nav class="l-nav-desktop">
                <a href="index.html">INICIO</a>
                <a href="buscar.html">BUSCAR</a>
                <a href="subir.html">SUBIR</a>
            </nav>
            <div class="l-nav-mobile">
                <span id="btn-menu" >☰</span>
                <ul class="mobile-menu" id="menu-desplegable">
                    <li><a href="index.html">INICIO</a></li>
                    <li><a href="buscar.html">BUSCAR</a></li>
                    <li><a href="subir.html">SUBIR</a></li>
                </ul>
            </div>
            <a class="user-info" href="login.html">LOGIN</a>
        </header>

        <main class="l-main">
            <button class="back-btn">VOLVER A TU BÚSQUEDA</button>

            <div class="l-dos-columnas">
                <section class="document-info">
                    <h2>Título del documento</h2>
                    <p>Autor: [Nombre]</p>
                    <p>Carrera: [Carrera]</p>
                    <p>Fecha: [Fecha]</p>
                    <p>Tipo: Tesina</p>
                    
                    <h3>Resumen Abstract:</h3>
                    <p>...</p>

                    <div class="tags-container">
                        <span>Etiqueta1</span>
                        <span>Etiqueta2</span>
                    </div>

                    <button class="download-btn">Descargar PDF</button>
                </section>

                <section class="l-document-preview">
                    <h3>Vista del documento en linea</h3>
                    <div class="pdf-viewer-placeholder">
                        Documento PDF Embebido
                    </div>
                </section>
            </div>
        </main>

        <footer class="l-footer">
            <p>PIE DE PÁGINA</p>
        </footer>
    </div>
</body>
</html>
