<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuHub - Subir Documento</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="l-wrapper">
         <header class="l-header">
            <div class="logo-circle">
                <img src="../assets/Logotipo.png" alt="Logo DocuHub" class="logo-img">
            </div>

            <nav class="l-nav-desktop">
                <a href="index.html">INICIO</a>
                <a href="buscar.html">BUSCAR</a>
                <a href="subir.html">SUBIR</a>
            </nav>
            <div class="l-nav-mobile">
                <span id="btn-menu" >☰</span>
                <ul class="mobile-menu" id="menu-desplegable">
                    <li><a href="index.html">INICIO</a></li>
                    <li><a href="buscar.html">BUSCAR</a></li>
                    <li><a href="subir.html">SUBIR</a></li>
                </ul>
            </div>
            <a class="user-info" href="login.html">LOGIN</a>
        </header>

        <main class="l-main">
            <h2 style="text-align: center;">SUBIR DOCUMENTO</h2>
            
            <form class="l-form-container">
                <p>Llena los campos</p>
                
                <label>Título del documento:</label>
                <input type="text" required>
                
                <label>Tipo de documento:</label>
                <select required>
                    <option value="">Selecciona...</option>
                </select>
                
                <label>Resumen / Abstract:</label>
                <textarea rows="5" required></textarea>
                
                <div style="display: flex; gap: 1rem; justify-content: space-between;">
                    <button type="button">Buscar documento PDF</button>
                    <button type="submit">Enviar</button>
                </div>
            </form>
        </main>

        <footer class="l-footer">
            <div class="footer-content">
                <p>&copy; 2026 MGA Nexus</p>
                <div class="footer-contact">
                    <p>Tel: (656) 123-4567</p>
                    <p>Correo: mganexusdochub@gmail.com</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
